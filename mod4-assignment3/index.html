<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="../mod4-assignment3/scripts/jQuery.js"></script>
    <link rel="stylesheet" href="../mod4-assignment3/css/styles.css">
    <title>Mod4 Assignment 3</title>
</head>
<body>
    <div id="container">
        <h1>jQuery 4</h1>
            <!--BUTTONS for CSS changes-->
            <button id="light">Light</button>
            <button id="dark">Dark</button>
            <button id="increase">Increase font-size</button>
            <button id="decrease">Decrease font-size</button>

            <h2>Networking Event Attendance</h2>
            <!--Form-->
            <form id="attendance">
                <label for="fname">First Name</label>
                <input type="text" id="fname" name="fname" placeholder="Jane" required>

                <label for="lname">Last Name</label>
                <input type="text" id="lname" name="lname" placeholder="Doe" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="j.doe@google.com" required>

                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="(123)-456-7890" required>

                <label for="job-title">Job Title</label>
                <input type="text" id="job-title" name="job-title" placeholder="Human Resources" required>

                <label for="company">Company</label>
                <input type="text" id="company" name="company" placeholder="Google" required>

                <button type="submit" value="submit-form">Submit</button> 
                <button type="button" id="clear">Clear</button>
            </form>

            <!--Add to bottom of list-->
            <h3><strong>Attendees</strong></h3>
            <p id="attendees"></p>

        <footer>&copy; 2026 Diamond Tuisano </footer>
    </div>
</body>
</html>
